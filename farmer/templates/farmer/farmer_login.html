{% load static %}
{% load crispy_forms_tags %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Farmer Registration</title>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            max-width: 500px;
            margin: auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 2.5rem;
            padding: 10px;
        }
        legend {
            font-size: 1.5rem;
            padding: 10px;
            border-radius: 10px;
            color: #007bff;
        }
        button {
            width: 100%;
            padding: 10px;
        }
        button:hover {
            background-color: #007bff;
            transition: background-color 0.3s ease;
        }
    </style>
</head>
<body>
    <header class="bg-success py-2"><h1 class="text-white text-center">AGRI_SHOP</h1></header>
    <div class="container mt-4 form-container border">
        <legend class="text-center bg-light mt-3">LogIn To AgriShop</legend>
        <div class="container border justify-content-center"> 
          <form method="POST">
              {% csrf_token %}
              {{form|crispy}}
              <div class="d-flex justify-content-center mt-5 mb-5">
                  <button class="btn btn-primary btn-lg" type="submit">Sign In</button>
              </div>   
              <div class="text-muted">
                <a href="{% url 'register' %}" style="color: inherit; text-decoration: none;">You don't have an account? Click here to register.</a>
            </div>            
          </form>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
